<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>倉管助理 Demo</title>
<style>
  /* 關閉按鈕 */
  #close-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,.35); color: #fff; border: none;
    font-size: 16px; font-weight: 700; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .2s; vertical-align: middle; margin-left: 4px;
  }
  #close-btn:hover { background: #e53e3e; }

  :root {
    --bg:        #f5f7fa;
    --card:      #ffffff;
    --primary:   #2c5282;   /* 深藍 */
    --primary-2: #4299e1;   /* 中藍 */
    --accent:    #ed8936;   /* 出貨橘 */
    --success:   #38a169;   /* 進貨綠 */
    --warning:   #e53e3e;   /* 缺貨紅 */
    --gold:      #d69e2e;   /* TOP 3 金 */
    --muted:     #718096;
    --border:    #e2e8f0;
    --text:      #1a202c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; overflow: hidden; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    background: var(--primary);
    color: white;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,.1);
  }
  header .icon { font-size: 22px; }
  header h1 { margin: 0; font-size: 17px; font-weight: 600; }
  header .sub { font-size: 12px; opacity: .8; margin-left: auto; }

  #chips-bar {
    background: white;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .chip {
    flex-shrink: 0;
    background: white;
    color: var(--primary);
    border: 1px solid var(--primary-2);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .chip:active { transform: scale(.95); }
  .chip.primary { background: var(--primary); color: white; }
  .chip.warning { background: var(--warning); color: white; border-color: var(--warning); }
  .chip.gold    { background: var(--gold);    color: white; border-color: var(--gold); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    -webkit-overflow-scrolling: touch;
  }
  .msg {
    margin-bottom: 14px;
    max-width: 88%;
  }
  .msg.user {
    margin-left: auto;
    background: var(--primary-2);
    color: white;
    padding: 10px 14px;
    border-radius: 18px 18px 4px 18px;
  }
  .msg.bot {
    background: white;
    padding: 12px 14px;
    border-radius: 18px 18px 18px 4px;
    border: 1px solid var(--border);
    white-space: pre-wrap;
    line-height: 1.6;
  }
  .msg.bot.guide { background: #ebf8ff; border-color: var(--primary-2); }
  .msg.bot.rejected { background: #fff5f5; border-color: var(--warning); color: #742a2a; }

  /* view card */
  .view-card {
    margin-top: 8px;
    padding: 14px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .view-card .kpi {
    font-size: 32px;
    font-weight: 700;
    color: var(--primary);
    margin: 6px 0;
  }
  .view-card .kpi.warning { color: var(--warning); }
  .view-card .kpi.success { color: var(--success); }
  .view-card .label { font-size: 12px; color: var(--muted); }
  .view-card .label.agent-label { font-size: 13px; font-weight: 600; color: var(--text); }
  .view-card .sub-label { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* 三倉橫條 */
  .wh-bars { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .wh-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .wh-bar .wh-name { width: 60px; color: var(--muted); }
  .wh-bar .bar-track {
    flex: 1; height: 18px; background: #edf2f7; border-radius: 9px; overflow: hidden;
  }
  .wh-bar .bar-fill {
    height: 100%; background: var(--primary-2);
    border-radius: 9px; transition: width .4s;
  }
  .wh-bar .wh-qty { width: 60px; text-align: right; font-weight: 600; }

  /* 警示表格 */
  .alert-table {
    width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px;
  }
  .alert-table th { background: #fff5f5; color: var(--warning); padding: 8px; text-align: left; font-weight: 600; }
  .alert-table td { padding: 8px; border-top: 1px solid var(--border); }
  .alert-table tr.critical td { background: #fff5f5; }
  .shortage-bar {
    height: 8px; background: #edf2f7; border-radius: 4px; overflow: hidden; margin-top: 3px;
  }
  .shortage-bar .fill { height: 100%; background: var(--warning); }

  /* 排行榜 */
  .rank-list { margin-top: 8px; }
  .rank-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-top: 1px solid var(--border); font-size: 13px;
  }
  .rank-row:first-child { border-top: none; }
  .rank-row .num {
    width: 30px; height: 30px; border-radius: 50%;
    background: #edf2f7; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
  }
  .rank-row .num.top1 { background: var(--gold); color: white; }
  .rank-row .num.top2 { background: #c4b59a; color: white; }
  .rank-row .num.top3 { background: #b08861; color: white; }
  .rank-row .name { flex: 1; font-weight: 500; }
  .rank-row .qty {
    background: var(--primary-2); color: white;
    padding: 3px 8px; border-radius: 10px; font-size: 12px; font-weight: 600;
  }

  /* 進出條形圖 */
  .mov-bars { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
  .mov-row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
  .mov-row .date { width: 70px; color: var(--muted); }
  .mov-row .bars { flex: 1; display: flex; gap: 2px; height: 16px; }
  .mov-row .in-bar  { background: var(--success); border-radius: 2px; }
  .mov-row .out-bar { background: var(--accent);  border-radius: 2px; }
  .mov-legend { font-size: 11px; color: var(--muted); margin-top: 6px; display: flex; gap: 12px; }
  .mov-legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; vertical-align: middle; margin-right: 4px; }

  /* 對比 */
  .cmp-pair { display: flex; gap: 10px; margin-top: 8px; }
  .cmp-col {
    flex: 1; background: #f7fafc; padding: 10px; border-radius: 8px; text-align: center;
  }
  .cmp-col.winner { background: #ebf8ff; border: 2px solid var(--primary-2); }
  .cmp-col .lbl { font-size: 12px; color: var(--muted); }
  .cmp-col .val { font-size: 20px; font-weight: 700; color: var(--primary); margin-top: 4px; }

  #input-bar {
    background: white;
    border-top: 1px solid var(--border);
    padding: 10px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #input-text {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 14px;
    font-size: 15px;
    outline: none;
    font-family: inherit;
    resize: none;
    min-height: 40px;
    max-height: 80px;
  }
  #input-text:focus { border-color: var(--primary-2); }
  #send-btn {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 18px;
    cursor: pointer;
    transition: all .15s;
  }
  #send-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* 麥克風 (Web Speech API) */
  .mic-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--border); background: white;
    cursor: pointer; padding: 0; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, border-color .2s;
  }
  .mic-btn svg { width: 22px; height: 22px; fill: var(--muted); }
  .mic-btn:hover { background: var(--bg); }
  .mic-btn.recording {
    background: var(--warning); border-color: var(--warning);
    animation: mic-pulse 1.2s ease-in-out infinite;
  }
  .mic-btn.recording svg { fill: white; }
  .mic-btn:disabled { opacity: .4; cursor: not-allowed; }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(229,62,62,.5); }
    50%      { box-shadow: 0 0 0 8px rgba(229,62,62,0); }
  }
  .mic-status {
    font-size: 12px; color: var(--muted);
    text-align: center; margin: 4px 0; min-height: 16px;
  }

  .suggestions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .sug {
    background: white;
    border: 1px solid var(--primary-2);
    color: var(--primary);
    padding: 5px 12px;
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
  }
  .sug:active { transform: scale(.95); }

  /* 連帶備貨 related view */
  .rel-anchor {
    font-size: 13px; color: var(--muted); margin-bottom: 4px;
  }
  .rel-anchor b { color: var(--text); font-size: 15px; }
  .rel-item {
    padding: 10px 0; border-top: 1px solid var(--border);
  }
  .rel-item:first-child { border-top: none; }
  .rel-item .rel-top {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .rel-item .rel-name { font-weight: 600; font-size: 14px; word-break: break-word; }
  .rel-item .rel-cat { font-size: 11px; color: var(--muted); }
  .conf-badge {
    font-size: 12px; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; cursor: pointer; white-space: nowrap;
    border: 1px dashed transparent;
  }
  .conf-badge:active { transform: scale(.94); }
  .conf-badge.gold { background: #fffaf0; color: #b7791f; border-color: #d69e2e; }
  .conf-badge.high { background: #fffaf0; color: #c05621; border-color: #ed8936; }
  .conf-badge.good { background: #f0fff4; color: #276749; border-color: #38a169; }
  .conf-badge.mid  { background: #ebf8ff; color: #2c5282; border-color: #4299e1; }
  .conf-badge.low  { background: #f7fafc; color: #718096; border-color: #cbd5e0; }
  .conf-badge .tap-hint { font-size: 9px; opacity: .6; margin-left: 2px; }
  .rel-quip {
    font-size: 13px; color: #5a6677; margin-top: 4px;
    font-style: italic; padding-left: 2px;
  }
  .rel-quip::before { content: "「"; }
  .rel-quip::after  { content: "」"; }
  .rel-stock {
    font-size: 11px; color: var(--muted); margin-top: 4px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .rel-stock .restock { color: var(--warning); font-weight: 600; }
  .days-badge {
    cursor: pointer; color: var(--primary); font-weight: 600;
    border: 1px dashed var(--primary-2); border-radius: 8px; padding: 1px 6px;
    white-space: nowrap;
  }
  .days-badge:active { transform: scale(.94); }
  .rel-trend-up   { color: var(--warning); }
  .rel-trend-down { color: var(--success); }
  .rel-restock-banner {
    margin-top: 10px; padding: 10px; background: #fff5f5;
    border: 1px solid var(--warning); border-radius: 8px;
    font-size: 13px; color: #742a2a; line-height: 1.5;
  }
  .rel-baseline-note {
    margin-top: 8px; font-size: 11px; color: var(--muted); text-align: center;
  }
  /* 點同捆率彈出的算式卡片 */
  #calc-pop {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: none; align-items: center; justify-content: center; z-index: 999;
    padding: 24px;
  }
  #calc-pop.show { display: flex; }
  .calc-box {
    background: white; border-radius: 16px; padding: 20px;
    max-width: 340px; width: 100%; box-shadow: 0 8px 30px rgba(0,0,0,.25);
  }
  .calc-box h3 { margin: 0 0 12px; font-size: 16px; color: var(--primary); }
  .calc-formula {
    background: #f7fafc; border-radius: 10px; padding: 14px;
    text-align: center; font-size: 15px; line-height: 1.8; margin: 10px 0;
  }
  .calc-formula .big { font-size: 26px; font-weight: 700; color: var(--primary); }
  .calc-compare {
    font-size: 13px; color: #5a6677; line-height: 1.7; margin-top: 10px;
  }
  .calc-compare .hi { color: var(--warning); font-weight: 700; }
  .calc-close {
    margin-top: 16px; width: 100%; padding: 10px; border: none;
    background: var(--primary); color: white; border-radius: 10px;
    font-size: 14px; cursor: pointer;
  }

  /* 鉤子入口 chip(獵奇/八卦/驚喜) */
  .chip.hook {
    background: linear-gradient(135deg, #ed8936, #dd6b20);
    color: white; border-color: #dd6b20;
  }
  .chip.hook.purple { background: linear-gradient(135deg, #805ad5, #6b46c1); border-color: #6b46c1; }

  /* ⏰ 到期警示 view + 燈號徽章 */
  .exp-counts {
    display: flex; gap: 6px; margin: 8px 0; flex-wrap: wrap;
  }
  .exp-counts .cnt {
    font-size: 12px; padding: 4px 10px; border-radius: 12px; font-weight: 600;
  }
  .exp-counts .cnt.red    { background: #fff5f5; color: var(--warning); border: 1px solid var(--warning); }
  .exp-counts .cnt.orange { background: #fffaf0; color: #c05621; border: 1px solid #ed8936; }
  .exp-counts .cnt.yellow { background: #fffff0; color: #b7791f; border: 1px solid #d69e2e; }
  .exp-counts .cnt.green  { background: #f0fff4; color: var(--success); border: 1px solid var(--success); }
  .exp-table {
    width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px;
  }
  .exp-table th {
    background: #f7fafc; color: var(--muted); padding: 8px; text-align: left;
    font-weight: 600; font-size: 12px;
  }
  .exp-table td { padding: 8px; border-top: 1px solid var(--border); }
  .exp-table tr.lvl-red    td { background: #fff5f5; }
  .exp-table tr.lvl-orange td { background: #fffaf0; }
  .exp-table tr.lvl-yellow td { background: #fffff0; }
  .exp-table .days {
    display: inline-block; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    font-size: 12px; white-space: nowrap;
  }
  .exp-table .days.red    { background: var(--warning); color: white; }
  .exp-table .days.orange { background: #ed8936; color: white; }
  .exp-table .days.yellow { background: #d69e2e; color: white; }
  /* 到期徽章(放在 inventory_single / related item 上)*/
  .exp-badge {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 10px; white-space: nowrap;
  }
  .exp-badge.red    { background: #fff5f5; color: var(--warning); border: 1px dashed var(--warning); }
  .exp-badge.orange { background: #fffaf0; color: #c05621;        border: 1px dashed #ed8936; }
  .exp-badge.yellow { background: #fffff0; color: #b7791f;        border: 1px dashed #d69e2e; }

  /* loading dot */
  .loading-dots { display: inline-flex; gap: 3px; }
  .loading-dots span {
    width: 6px; height: 6px; background: var(--muted); border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: .15s; }
  .loading-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(.5); opacity: .3; }
    40% { transform: scale(1); opacity: 1; }
  }
  /* ── v2 Agent trace（多步浮現）── */
  .agent-trace { display: flex; flex-direction: column; gap: 6px; margin: 6px 0; }
  .trace-step {
    display: flex; align-items: flex-start; gap: 8px; padding: 7px 10px;
    background: rgba(120,160,255,.08); border-left: 3px solid var(--accent);
    border-radius: 6px; font-size: 13px; opacity: 0;
    animation: traceIn .35s ease forwards;
  }
  @keyframes traceIn { from { opacity:0; transform: translateX(-8px);} to {opacity:1; transform:none;} }
  .ts-icon { font-size: 15px; }
  .ts-kind { font-weight: 700; color: var(--accent); white-space: nowrap; min-width: 72px; }
  .ts-detail { color: var(--fg); line-height: 1.6; }
  .ts-warn { color: var(--danger) !important; font-weight: 600; }
  .ts-sub { margin: 4px 0 2px 28px; display: flex; flex-direction: column; gap: 2px; }
  .ts-sub-line { font-size: 12px; color: var(--muted); font-family: monospace; line-height: 1.5; }
  .ts-sub-line.ts-warn { color: var(--danger) !important; font-weight: 600; }
  .trace-step.trace-in { opacity: 0; animation: traceIn .35s ease forwards; }
  .agent-trace { max-height: 320px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
  .rca-result { animation: traceIn .4s ease forwards; }
  .rca-summary {
    margin-top: 12px; padding: 10px 12px;
    background: var(--surface2, #f5f5f5); border-left: 3px solid var(--accent);
    border-radius: 6px; font-size: 13px; line-height: 1.7;
    animation: traceIn .4s ease forwards;
  }
  .tool-call-inline {
    font-size: 11px; color: var(--muted); margin: 2px 0; opacity: 0.8;
  }
  .tool-call-inline code {
    background: var(--surface2, #f0f0f0); padding: 1px 5px;
    border-radius: 4px; font-family: monospace; font-size: 11px;
  }
  .tool-calls-bar {
    font-size: 11px; color: var(--muted); padding: 3px 0 4px;
    border-bottom: 1px solid var(--border, #eee); margin-bottom: 6px;
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .rca-suggest {
    margin-top: 8px; padding: 10px 12px;
    background: var(--surface2, #f5f5f5); border-left: 3px solid var(--warning, #e67e22);
    border-radius: 6px; font-size: 13px; line-height: 1.7;
    animation: traceIn .4s ease forwards;
  }
  /* ── HITL 確認框 ── */
  .clarify-opts { display: flex; flex-direction: column; gap: 5px; margin: 4px 0 8px; }
  .clarify-row { display: flex; align-items: baseline; gap: 8px; padding: 4px 0; }
  .clarify-num {
    min-width: 22px; height: 22px; line-height: 22px; text-align: center;
    background: var(--accent); color: #fff; border-radius: 50%;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .clarify-text { font-size: 14px; color: var(--fg); }
  .clarify-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .confirm-box { background: rgba(255,180,80,.10); border: 1px solid var(--warn,#ed8936);
    border-radius: 8px; padding: 12px; }
  .confirm-msg { font-size: 14px; margin-bottom: 8px; }
  .confirm-btns { display: flex; gap: 10px; margin-top: 8px; }
  .cbtn { flex: 1; padding: 10px; border: none; border-radius: 7px; font-size: 14px;
    font-weight: 700; cursor: pointer; }
  .cbtn.yes { background: var(--accent); color: #fff; }
  .cbtn.no  { background: rgba(150,150,150,.2); color: var(--fg); }
  /* ── Human-in-the-loop 授權卡片 ── */
  .hitl-card { border-radius: 10px; overflow: hidden; margin: 6px 0;
    box-shadow: 0 2px 12px rgba(0,0,0,.18); animation: traceIn .25s ease; }
  .hitl-header { display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; font-weight: 700; font-size: 13px; }
  .hitl-header.warn  { background: rgba(237,137,54,.18); border-bottom: 2px solid #ed8936; color: #c97a1a; }
  .hitl-header.danger{ background: rgba(220,53,69,.15);  border-bottom: 2px solid #dc3545; color: #b02535; }
  .hitl-header.info  { background: rgba(99,179,237,.15); border-bottom: 2px solid #63b3ed; color: #2b6cb0; }
  .hitl-body  { padding: 12px 14px; font-size: 13px; }
  .hitl-diff  { display: flex; align-items: center; gap: 10px; margin: 10px 0;
    padding: 10px; border-radius: 8px; background: rgba(0,0,0,.06); flex-wrap: wrap; }
  .hitl-before{ color: #e53e3e; font-weight: 700; font-size: 16px; text-decoration: line-through; opacity: .8; }
  .hitl-arrow { font-size: 18px; color: var(--muted); }
  .hitl-after { color: #38a169; font-weight: 700; font-size: 16px; }
  .hitl-meta  { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .hitl-btns  { display: flex; gap: 10px; padding: 12px 14px 14px;
    border-top: 1px solid var(--border); }
  .hitl-approve { flex: 1; padding: 11px; border: none; border-radius: 8px;
    background: #38a169; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
    transition: background .15s; }
  .hitl-approve:hover { background: #2f855a; }
  .hitl-reject  { flex: 1; padding: 11px; border: none; border-radius: 8px;
    background: rgba(150,150,150,.18); color: var(--fg); font-size: 14px;

<body>

<header>

  </button>

</header>

<!-- 右側警示規則 Panel -->
<div id="alert-panel" class="alert-panel">
  <div class="alert-panel-header">

<div id="chips-bar">
  <!-- 鉤子入口(隨機輪播、勾起好奇)由 JS 動態插入到這 -->

      <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
    </svg>

<script>
// ── 關閉頁面（防誤觸）──
function closePage() {
  if (confirm('確定要關閉倉管助理嗎？')) {
    window.close();
    // fallback: 如果 window.close() 無效（非 script 開啟的視窗），顯示提示
    setTimeout(() => {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:20px;color:#666">頁面已關閉，請手動關閉此分頁（Ctrl+W 或 Alt+F4）</div>';
    }, 300);
  }
}
const $ = id => document.getElementById(id);
const messages = $('messages');

// ── 🔔 Alert Panel ──────────────────────────────────────
let _alertPanelOpen = false;

function toggleAlertPanel() {
  _alertPanelOpen = !_alertPanelOpen;
  const panel = $('alert-panel');
  const overlay = $('alert-panel-overlay');
  panel.classList.toggle('open', _alertPanelOpen);
  overlay.classList.toggle('open', _alertPanelOpen);
  if (_alertPanelOpen) loadAlertPanel();
}

async function loadAlertPanel() {
  const body = $('alert-panel-body');
  body.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:24px 0">載入中...</div>';
  try {
    const r = await fetch('/api/alerts');
    const data = await r.json();
    renderAlertPanel(data.rules || []);
  } catch(e) {
    body.innerHTML = '<div style="color:#e53e3e;font-size:13px;padding:12px">載入失敗</div>';
  }
}

function renderAlertPanel(rules) {
  const body = $('alert-panel-body');
  const badge = $('alert-badge');
  const active = rules.filter(r => r.enabled !== false);
  badge.textContent = active.length;
  badge.style.display = active.length > 0 ? 'block' : 'none';

  if (active.length === 0) {
    body.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:32px 0">目前沒有警示規則<br><br>試試：「當洗衣精低於安全庫存時通知我」</div>';
    return;
  }
  body.innerHTML = active.map(r => `
    <div class="alert-rule-card" id="arc-${r.id}">
      <button class="alert-rule-del" onclick="deleteAlert('${r.id}')" title="刪除">✕</button>
      <div class="alert-rule-id">${r.id}</div>
      <div class="alert-rule-cond">⚡ ${r.condition_label || r.condition}</div>
      <div class="alert-rule-scope">📦 ${r.scope_txt || '全部商品'}</div>
      <div class="alert-rule-time">建立：${(r.created || '').slice(0,16).replace('T',' ')}</div>
    </div>
  `).join('');
}

async function deleteAlert(ruleId) {
  if (!confirm(`確定刪除警示規則 ${ruleId}？`)) return;
  try {
    const r = await fetch(`/api/alerts/${ruleId}`, {method: 'DELETE'});
    if (r.ok) loadAlertPanel();
    else alert('刪除失敗');
  } catch(e) { alert('刪除失敗：' + e); }
}

let _currentPanelTab = 'alerts';

function switchPanelTab(tab) {
  _currentPanelTab = tab;
  document.querySelectorAll('.apt').forEach(b => b.classList.remove('active'));
  $('tab-' + tab).classList.add('active');
  const footer = $('alert-panel-footer');
  if (tab === 'alerts') {
    footer.innerHTML = '<button onclick="triggerAlertCheck()" class="alert-check-btn">⚡ 立即掃描警示</button>';
    loadAlertPanel();
  } else {
    footer.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:4px 0">輸入「每天早上9點幫我跑盤點」設定排程</div>';
    loadSchedulePanel();
  }
}

async function loadSchedulePanel() {
  const body = $('alert-panel-body');
  body.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:24px 0">載入中...</div>';
  try {
    const r = await fetch('/api/schedules');
    const data = await r.json();
    renderSchedulePanel(data.jobs || []);
  } catch(e) {
    body.innerHTML = '<div style="color:#e53e3e;font-size:13px;padding:12px">載入失敗</div>';
  }
}

function renderSchedulePanel(jobs) {
  const body = $('alert-panel-body');
  const active = jobs.filter(j => j.enabled !== false);
  if (active.length === 0) {
    body.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:32px 0">目前沒有定時排程<br><br>輸入「每天早上9點幫我跑盤點」來設定</div>';
    return;
  }
  body.innerHTML = active.map(j => {
    const lastRun = j.last_run ? j.last_run.slice(0,16).replace('T',' ') : '尚未執行';
    return `
    <div class="schedule-card" id="sc-${j.id}">
      <button class="schedule-card-del" onclick="deleteSchedule('${j.id}')" title="刪除">✕</button>
      <div class="schedule-card-id">${j.id}</div>
      <div class="schedule-card-label">⏰ ${j.script_label}</div>
      <div class="schedule-card-time">${j.freq_label} ${j.time_str} 自動執行</div>
      <div class="schedule-card-next">上次執行：${lastRun}</div>
    </div>`;
  }).join('');
}

async function deleteSchedule(jobId) {
  if (!confirm(`確定刪除排程 ${jobId}？`)) return;
  try {
    const r = await fetch(`/api/schedules/${jobId}`, {method: 'DELETE'});
    if (r.ok) loadSchedulePanel();
    else alert('刪除失敗');
  } catch(e) { alert('刪除失敗：' + e); }
}

async function triggerAlertCheck() {
  const btn = document.querySelector('.alert-check-btn');
  btn.textContent = '⚡ 掃描中...';
  btn.disabled = true;
  try {
    await fetch('/api/alerts/check', {method: 'POST'});
    btn.textContent = '✓ 掃描完成';
    setTimeout(() => { btn.textContent = '⚡ 立即掃描'; btn.disabled = false; }, 2000);
  } catch(e) {
    btn.textContent = '⚡ 立即掃描'; btn.disabled = false;
  }
}

const CATEGORY_LABEL = {
  electronics: '電子產品', appliance_kitchen: '家電廚具',
  food_beverage: '食品飲料', daily_goods: '日用品',
  apparel: '服飾', sports: '運動用品',
};
const WAREHOUSE_LABEL = {
  north: '北區倉', central: '中區倉', south: '南區倉', all: '全部倉',
};

let ws = null;
let wsReconnectTimer = null;
let isSending = false;
let currentBotMsg = null;
let lastBotAnchor = null;   // 最後插入在訊息泡後的元素(卡片)、follow-up 鈕接在它後面

function connectWS() {
  if (ws) { try { ws.close(); } catch {} }
  if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${wsProto}//${location.host}/ws`);
  ws.onopen = () => { console.log('[ws] open'); isSending = false; };
  ws.onclose = () => { console.log('[ws] close'); scheduleReconnect(); };
  ws.onerror = e => { console.log('[ws] error', e); try { ws.close(); } catch {} };
  ws.onmessage = ev => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    handleMessage(msg);
  };
}
function scheduleReconnect() {
  if (wsReconnectTimer) return;
  if (document.hidden) return;
  wsReconnectTimer = setTimeout(() => { wsReconnectTimer = null; connectWS(); }, 3000);
}
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    if (ws) { try { ws.close(); } catch {} }
    setTimeout(connectWS, 100);
  }
});
connectWS();

// ── 主動異常偵測：進站自動拉一次 + 持續接 WS 推播 ──
function renderAnomalyBanner(data) {
  const all = data.alerts || [];
  const counts = data.counts || {};
  let bar = document.getElementById('anomalyBar');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'anomalyBar';
    bar.className = 'anomaly-bar';
    // 插到訊息區 #messages 的前面（不要碰 body，否則版面壞掉）
    const host = document.getElementById('messages');
    if (host && host.parentNode) {
      host.parentNode.insertBefore(bar, host);
    } else {
      return;   // 找不到掛載點就不顯示，絕不破壞頁面
    }
  }
  const crit = counts.critical || 0, warn = counts.warning || 0, info = counts.info || 0;
  if (crit + warn + info === 0) { bar.style.display = 'none'; return; }
  const top = all.filter(a => a.level !== 'info').slice(0, 5);
  bar.style.display = 'block';
  bar.innerHTML = `
    <div class="ab-head" onclick="this.parentNode.classList.toggle('open')">
      <b>⚠ 主動偵測到 ${crit + warn} 項需注意異常</b>
      <span class="ab-badges">
        ${crit ? `<span class="ab-b crit">${crit} 嚴重</span>` : ''}
        ${warn ? `<span class="ab-b warn">${warn} 警告</span>` : ''}
        ${info ? `<span class="ab-b info">${info} 注意</span>` : ''}
      </span>
      <span class="ab-toggle">展開 ▼</span>
    </div>
    <div class="ab-list">
      ${top.map(a => `<div class="ab-item ${a.level}">
        <span class="ab-dot"></span>
        <span><b>${a.title}</b><br><span class="ab-detail">${a.detail || ''}</span></span>
      </div>`).join('')}
      ${all.filter(a=>a.level!=='info').length > 5 ? `<div class="ab-more">…還有 ${all.filter(a=>a.level!=='info').length - 5} 項</div>` : ''}
    </div>`;
}
function pullAnomalies() {
  fetch('/anomalies').then(r => r.json()).then(renderAnomalyBanner).catch(() => {});
}
setTimeout(pullAnomalies, 1200);   // 進站自動偵測（不靠使用者問）

function appendBot(text, klass) {
  const div = document.createElement('div');
  div.className = 'msg bot' + (klass ? ' ' + klass : '');
  div.textContent = text || '';
  messages.appendChild(div);
  scrollBottom();
  return div;
}
function appendUser(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.textContent = text;
  messages.appendChild(div);
  scrollBottom();
}
function appendLoading() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
  messages.appendChild(div);
  scrollBottom();
  return div;
}
function scrollBottom() {
  requestAnimationFrame(() => { messages.scrollTop = messages.scrollHeight; });
}

function showSuggestions(items) {
  if (!currentBotMsg) return;
  const wrap = document.createElement('div');
  wrap.className = 'suggestions';
  items.forEach(it => {
    const btn = document.createElement('button');
    btn.className = 'sug';
    btn.textContent = it.label;
    btn.onclick = () => {
      if (it.action) it.action();
      else if (it.direct_call) sendDirectCall(it.direct_call.function, it.direct_call.args || {});
      else if (it.query) sendQuery(it.query);
    };
    wrap.appendChild(btn);
  });
  // 接在「卡片」後面(若有),否則接在訊息泡後面 → 鈕永遠在最下面
  const anchor = (lastBotAnchor && lastBotAnchor.parentNode) ? lastBotAnchor : currentBotMsg;
  anchor.parentNode.insertBefore(wrap, anchor.nextSibling);
  lastBotAnchor = wrap;
  scrollBottom();
}

// ── 動態引導：讀現在的異常，丟一句「具體可點」的問題（解「想不出要問什麼」）──
function suggestFromAnomalies() {
  fetch('/anomalies').then(r => r.json()).then(d => {
    const alerts = (d.alerts || []).filter(a => a.level !== 'info');
    if (!alerts.length) return;
    // 挑最嚴重的一筆，組一句「使用者可以這樣問」的具體引導
    const a = alerts[0];
    let q = '', hint = '';
    if (a.type === 'po_short') {
      q = `${a.data.name}怎麼少這麼多`;
      hint = `我發現「${a.data.name}」帳對不上，要不要點我幫你追原因？`;
    } else if (a.type === 'low_stock') {
      q = `${a.data.name}的安全庫存是多少`;
      hint = `「${a.data.name}」快斷貨了（撐 ${a.data.days_left} 天），想看設定嗎？`;
    } else if (a.type === 'expiry') {
      q = '快到期的有哪些';
      hint = `有商品快到期了，要不要看完整到期清單？`;
    } else {
      q = '幫我出個全倉體檢報告';
      hint = '掃到一些異常，要不要我出一份全倉體檢報告？';
    }
    const cb = appendBot('💡 ' + hint);
    showSuggestions([
      { label: '👉 ' + q, query: q },
      { label: '📄 出全倉體檢報告', query: '幫我出個全倉體檢報告' },
    ]);
    currentBotMsg = null;
  }).catch(() => {});
}

};

let _traceContainer = null;  // 目前訊息泡的 trace 容器
let _pendingToolCalls = [];  // tool_call 訊息暫存，等 card 建好後插入
let _rcaCardId = null;       // 當次 agent_rca card 的 id，給 round2 handler 用

function appendTraceStep(step) {
  // 若還沒有 trace 容器，建一個接在目前 bot 訊息後面
  if (!_traceContainer) {
    _traceContainer = document.createElement('div');
    _traceContainer.className = 'agent-trace-live';
    _traceContainer.style.cssText =
      'margin:4px 0 4px 12px;padding:6px 10px;border-left:2px solid var(--border);' +
      'font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:4px;';
    if (currentBotMsg) {
      currentBotMsg.parentNode.insertBefore(_traceContainer, currentBotMsg.nextSibling);
    } else {
      $('chat').appendChild(_traceContainer);
    }
  }
  const k = TRACE_KIND[step.kind] || { icon: '▸', label: step.kind, color: '#888' };
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:flex-start;gap:6px;animation:traceIn .2s ease';
  row.innerHTML =
    `<span style="min-width:18px">${k.icon}</span>` +
    `<span style="color:${k.color};font-weight:600;min-width:72px">${k.label}</span>` +
    `<span style="color:var(--text-secondary)">${step.detail}</span>`;
  _traceContainer.appendChild(row);
  scrollBottom();
}

function handleMessage(msg) {
  if (msg.type === 'anomaly_alert') {
    pullAnomalies();
    return;
  }
  if (msg.type === 'alert_triggered') {
    // 背景排程掃到警示觸發 → 推一張通知 card
    const banner = document.createElement('div');
    banner.className = 'alert-triggered-banner';
    banner.innerHTML = `🔔 <b>警示觸發</b>（${msg.rule_id}）${msg.ts || ''}<br>
      <span style="color:var(--muted)">${msg.scope_txt}：${msg.condition_label}</span><br>
      ${msg.detail || ''}`;
    messages.appendChild(banner);
    scrollBottom();
    // 更新 badge
    const badge = $('alert-badge');
    const cur = parseInt(badge.textContent) || 0;
    badge.textContent = cur;
    badge.style.display = 'block';
    badge.style.background = '#e53e3e';
    if (_alertPanelOpen) loadAlertPanel();
    return;
  }
  if (msg.type === 'alert_deleted') {
    if (_alertPanelOpen) loadAlertPanel();
    return;
  }
  if (msg.type === 'schedule_triggered') {
    const banner = document.createElement('div');
    banner.className = 'schedule-triggered-banner';
    banner.innerHTML = `⏰ <b>排程自動執行</b>（${msg.job_id}）${msg.ts || ''}<br>
      <span style="color:var(--muted)">正在執行：${msg.script_label}</span>`;
    messages.appendChild(banner);
    scrollBottom();
    return;
  }
  if (msg.type === 'schedule_done') {
    const banner = document.createElement('div');
    banner.className = 'schedule-triggered-banner';
    const icon = msg.ok ? '✅' : '❌';
    banner.innerHTML = `${icon} <b>${msg.script_label}</b> 執行${msg.ok ? '完成' : '失敗'}<br>
      <span style="color:var(--muted)">${msg.output_tail || msg.summary || ''}</span>`;
    messages.appendChild(banner);
    scrollBottom();
    if (_alertPanelOpen && _currentPanelTab === 'schedules') loadSchedulePanel();
    return;
  }
  if (msg.type === 'schedule_created' || msg.type === 'schedule_deleted') {
    if (_alertPanelOpen && _currentPanelTab === 'schedules') loadSchedulePanel();
    return;
  }
  if (msg.type === 'task_plan') {
    renderTaskPlan(msg.steps);
    return;
  }
  if (msg.type === 'task_tick') {
    tickTaskStep(msg.index);
    return;
  }
  if (msg.type === 'trace_step') {
    if (_rcaCardId) {
      const existCard = document.getElementById(_rcaCardId);
      if (existCard) {
        const row = document.createElement('div');
        row.style.cssText = 'margin:4px 0;padding:5px 8px;background:rgba(160,140,90,.12);border-radius:4px;font-size:12px;color:var(--text-secondary)';
        row.textContent = '[分析] ' + (msg.step.detail || '');
        // 插到 suggest 之前（tool_calls 之後）
        const suggestEl = existCard.querySelector('[id^=\"rca-suggest-\"]');
        if (suggestEl && suggestEl.parentNode) {
          suggestEl.parentNode.insertBefore(row, suggestEl);
        } else {
          existCard.appendChild(row);
        }
        return;
      }
    }
    appendTraceStep(msg.step);
    return;
  }
  if (msg.type === 'token') {
    if (!currentBotMsg) currentBotMsg = appendBot('');
    currentBotMsg.textContent += msg.text;
    scrollBottom();
    return;
  }
  if (msg.type === 'error') {
    if (currentBotMsg) currentBotMsg.remove();
    appendBot(msg.text, 'rejected');
    currentBotMsg = null;
    isSending = false;
    $('send-btn').disabled = false;
    return;
  }
  if (msg.type === 'tool_call') {
    const tcHtml = `🔧 <code>${msg.func}(${msg.args_preview || ''})</code>`;
    // 第二輪（_rcaCardId 已存在）→ 插到 rca-suggest 前
    if (_rcaCardId) {
      const existCard = document.getElementById(_rcaCardId);
      if (existCard) {
        const suggestEl = existCard.querySelector('[id^="rca-suggest-"]');
        const tc = document.createElement('div');
        tc.className = 'tool-call-inline';
        tc.innerHTML = tcHtml;
        if (suggestEl) suggestEl.before(tc);
        else existCard.appendChild(tc);
        return;
      }
    }
    // 第一輪：card 還沒建，暫存
    _pendingToolCalls.push(tcHtml);
    return;
  }
  if (msg.type === 'rca_round2_start') {
    // 第二輪 LLM 開始：在 rca-suggest 區塊顯示 loading 動畫
    const _rcaCard2 = _rcaCardId ? document.getElementById(_rcaCardId) : null;
    const suggestEl = _rcaCard2 ? _rcaCard2.querySelector('[id^="rca-suggest-"]') : null;
    if (suggestEl) {
      suggestEl.innerHTML = '<span style="color:var(--muted);font-size:13px">💡 Agent 推理建議行動 </span><span class="loading-dots"><span></span><span></span><span></span></span>';
      suggestEl.style.display = '';
    }
    return;
  }
  if (msg.type === 'rca_round2_done') {
    const _rcaCard3 = _rcaCardId ? document.getElementById(_rcaCardId) : null;
    const suggestEl = _rcaCard3 ? _rcaCard3.querySelector('[id^="rca-suggest-"]') : null;
    if (suggestEl && msg.suggestion) {
      const actionColor = {
        contact_supplier: '#e67e22',
        create_po:        'var(--danger)',
        monitor:          'var(--accent)',
      }[msg.suggestion_action] || 'var(--accent)';
      suggestEl.innerHTML = `<span style="font-weight:600;color:${actionColor}">💡 Agent 建議</span><br>${msg.suggestion.replace(/</g,'&lt;')}`;
    } else if (suggestEl) {
      suggestEl.style.display = 'none';
    }
    _rcaCardId = null;
    isSending = false;
    $('send-btn').disabled = false;
    return;
  }
  if (msg.type === 'done') {
    const result = msg.result || {};
    const view = result.view;
    const data = result.data || {};
    lastBotAnchor = currentBotMsg;   // 預設接在訊息泡後;有卡片時 renderViewCard 會改成卡片
    if (view && view !== 'guide' && view !== 'rejected') {
      renderViewCard(view, data, result.summary);
    }
    renderFollowups(view, data);
    currentBotMsg = null;
    if (_traceContainer && _traceContainer.parentNode) { _traceContainer.parentNode.removeChild(_traceContainer); }
    _traceContainer = null;
    _pendingToolCalls = [];
    _taskPlanEl = null;
    // 存下 card id 給 round2 handler 用（但不鎖按鈕，訪客可繼續問）
    if (view === 'agent_rca' && lastBotAnchor && lastBotAnchor.id) {
      _rcaCardId = lastBotAnchor.id;
    }
    isSending = false;
    $('send-btn').disabled = false;
    return;
  }
}

    window._clarifyOpts = opts;
    // actions：實際送出的指令（沒有就 fallback 用 opts）
    window._clarifyActions = data.actions || opts;
  } else {
    return;
  }
  // 把暫存的 tool call 插到 card 標題下方
  if (_pendingToolCalls.length) {

  lastBotAnchor = card;
  scrollBottom();
}

// ── HITL 確認：把 pending 送回 server commit ──
function doConfirm(btn) {
  const action = btn.dataset.action;
  const payload = JSON.parse(btn.dataset.payload || '{}');
  const btnsEl = btn.closest('.hitl-btns');
  if (btnsEl) btnsEl.innerHTML = '<div style="padding:10px;color:var(--muted)">執行中…</div>';
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    connectWS();
    setTimeout(() => ws.send(JSON.stringify({type:'confirm', action, ...payload})), 1200);
    return;
  }
  ws.send(JSON.stringify({type:'confirm', action, ...payload}));
}

function formatMetric(metric, val) {
  if (metric === 'stock_value') return `NT$ ${val.toLocaleString()}`;
  if (metric === 'item_count')  return `${val.toLocaleString()} 件`;
  if (metric === 'turnover')    return val.toFixed(3);
  return String(val);
}

// ─── 點同捆率 → 彈出「這數字怎麼算」算式卡片(純前端、零延遲)───
function showCalc(el) {
  const conf = el.dataset.conf;
  const co = +el.dataset.co;
  const anchorOrders = +el.dataset.anchorOrders;
  const baseline = +el.dataset.baseline;
  const aname = el.dataset.aname;
  const bname = el.dataset.bname;
  const ratio = baseline > 0 ? (conf / baseline) : 0;
  const box = $('calc-box');
  box.innerHTML = `
    <h3>🔍 ${conf}% 是怎麼算出來的?</h3>
    <div class="calc-formula">
      在買「${aname}」的 <b>${anchorOrders}</b> 張訂單裡,<br>
      有 <b>${co}</b> 張也買了「${bname}」<br>
      <span class="big">${co} ÷ ${anchorOrders} = ${conf}%</span>
    </div>
    <div class="calc-compare">
      📊 隨便兩個商品「剛好」同單的機率只有 <b>${baseline}%</b>。<br>
      這組高達 ${conf}%,是隨機的 <span class="hi">約 ${ratio.toFixed(0)} 倍</span> —
      代表它們是<span class="hi">真的常一起被買</span>,不是巧合。
    </div>
    <div class="calc-compare" style="margin-top:8px;font-size:11px;color:var(--muted)">
      這就是「購物籃分析」,跟 Amazon「買了這個的人也買了」同一套作法 —
      系統真的去數了訂單算出來,不是寫死的。
    </div>
    <button class="calc-close" onclick="closeCalc()">懂了！</button>
  `;
  $('calc-pop').classList.add('show');
}
function closeCalc() { $('calc-pop').classList.remove('show'); }

// ─── 點「撐 X 天」→ 彈出庫存預測算式 ───
function showForecast(el) {
  const stock = +el.dataset.stock;
  const burn = +el.dataset.burn;
  const days = +el.dataset.days;
  const trend = el.dataset.trend;
  const safety = +el.dataset.safety;
  const suggest = +el.dataset.suggest;
  const target = +el.dataset.target;
  const bname = el.dataset.bname;
  const reorder = el.dataset.reorder === '1';
  let pw = [];
  try { pw = JSON.parse(decodeURIComponent(el.dataset.pw || '[]')); } catch {}
  const trendTxt = trend === 'up' ? '↗ 上升(賣越來越快、消耗 ×1.3 不低估)'
                 : (trend === 'down' ? '↘ 下滑(退燒中、消耗 ×0.8)' : '→ 持平');
  const box = $('calc-box');
  box.innerHTML = `
    <h3>⏳ 「${bname}」還能撐 ${days} 天?</h3>
    <div class="calc-formula">
      現有庫存 <b>${stock}</b> 件<br>
      ÷ 每天約賣 <b>${burn}</b> 件<br>
      <span class="big">${stock} ÷ ${burn} ≈ ${days} 天</span>
    </div>
    <div class="calc-compare">
      📈 每天賣多少 = 看近 30 天平均,再依趨勢加權:<br>
      　趨勢 ${trendTxt}<br>
      🔔 庫存跌到安全線(${safety} 件)或撐不到 7 天 → 就提醒補貨。
    </div>
    ${reorder && suggest > 0 ? `
      <div class="calc-compare" style="margin-top:10px;background:#fff5f5;padding:10px;border-radius:8px">
        📦 <b class="hi">建議補 ${suggest} 件</b>${pw.length ? `
        <div style="margin-top:6px;font-size:12px">
          ${pw.map(x => `<div>　• ${x.label}:現 ${x.stock} 件 → 補 <b>${x.suggest_qty}</b> 件</div>`).join('')}
        </div>` : ''}
        <span style="font-size:11px;color:var(--muted)">每倉各自補到能撐 ${target} 天、含叫貨緩衝(缺最多的倉排前面)</span>
      </div>` : ''}
    <div class="calc-compare" style="margin-top:8px;font-size:11px;color:var(--muted)">
      這叫「線性消耗預測」— 依最近賣法往前推,倉儲補貨常用算法,不是亂猜。
    </div>
    <button class="calc-close" onclick="closeCalc()">懂了！</button>
  `;
  $('calc-pop').classList.add('show');
}

const SURPRISE_KEYWORDS = [
  '藍牙耳機','咖啡機','尿布','帳篷','瑜珈墊','慢跑鞋','洗衣精','羽絨外套',
  '氣泡水','野炊鍋','防蚊液','登山水壺','健身環','排汗衣','行動電源',
];
function randomSurprise() {
  const kw = SURPRISE_KEYWORDS[Math.floor(Math.random() * SURPRISE_KEYWORDS.length)];
  sendQuery(`買${kw}的人還會買什麼`);
}

function sendQuery(text) {
  if (isSending || !text) return;
  $('input-text').value = '';  // 通過 guard 才清空，避免文字不見但沒送出
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    connectWS();
    setTimeout(() => sendQuery(text), 300);
    return;
  }
  isSending = true;
  $('send-btn').disabled = true;
  appendUser(text);
  currentBotMsg = appendLoading();
  setTimeout(() => { if (currentBotMsg) currentBotMsg.innerHTML = ''; }, 50);
  ws.send(JSON.stringify({ type: 'chat', text }));
}

function sendDirectCall(func, args) {
  if (isSending) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    connectWS();
    setTimeout(() => sendDirectCall(func, args), 300);
    return;
  }
  isSending = true;
  $('send-btn').disabled = true;
  const labelMap = { list_low_stock: '🚨 庫存警示', list_expiring_items: '⏰ 到期警示' };
  appendUser(labelMap[func] || func);
  currentBotMsg = appendLoading();
  setTimeout(() => { if (currentBotMsg) currentBotMsg.innerHTML = ''; }, 50);
  ws.send(JSON.stringify({ type: 'direct_call', function: func, args }));
}

function resolveInput(raw) {
  // 如果有 clarify 選項待機，且輸入是純數字 → 展開成 action（實際指令）
  if (window._clarifyOpts && /^[1-4]$/.test(raw)) {
    const idx = parseInt(raw) - 1;
    if (idx >= 0 && idx < window._clarifyOpts.length) {
      // 優先用 actions（對應實際工具指令），沒有才用顯示文字
      const actions = window._clarifyActions || window._clarifyOpts;
      const resolved = actions[idx] || window._clarifyOpts[idx];
      window._clarifyOpts = null;
      window._clarifyActions = null;
      document.querySelectorAll('.view-card').forEach(el => {
        if (el.querySelector('.clarify-opts')) el.remove();
      });
      return resolved;
    }
  }
  window._clarifyOpts = null;
  window._clarifyActions = null;
  return raw;
}

$('input-text').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const raw = $('input-text').value.trim();
    if (raw) {
      sendQuery(resolveInput(raw));
    }
  }
});
$('send-btn').onclick = () => {
  const raw = $('input-text').value.trim();
  if (raw) {
    sendQuery(resolveInput(raw));
  }
};

// ─── 語音輸入 (Web Speech API、zh-TW) ───
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
const micBtn = $('mic-btn');
const micStatus = $('mic-status');
let recognition = null;
let isRecording = false;

if (!SpeechRec) {
  micBtn.disabled = true;
  micBtn.title = '此瀏覽器不支援語音輸入（建議用 Chrome / Edge / Safari）';
} else {
  recognition = new SpeechRec();
  recognition.lang = 'zh-TW';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add('recording');
    micStatus.textContent = '🎤 聆聽中... 請說話';
  };
  recognition.onresult = ev => {
    let txt = '';
    for (let i = 0; i < ev.results.length; i++) {
      txt += ev.results[i][0].transcript;
    }
    $('input-text').value = txt;
  };
  recognition.onerror = ev => {
    isRecording = false;
    micBtn.classList.remove('recording');
    if (ev.error === 'not-allowed' || ev.error === 'permission-denied') {
      micStatus.textContent = '❌ 麥克風權限被拒、請到瀏覽器設定開啟';
    } else if (ev.error === 'no-speech') {
      micStatus.textContent = '⚠️ 沒聽到聲音、請再試一次';
    } else if (ev.error === 'network') {
      micStatus.textContent = '⚠️ 語音辨識需要網路（iOS Safari 離線可用）';
    } else {
      micStatus.textContent = `語音錯誤：${ev.error}`;
    }
  };
  recognition.onend = () => {
    isRecording = false;
    micBtn.classList.remove('recording');
    const text = $('input-text').value.trim();
    if (text) {
      micStatus.textContent = '✓ 辨識完成、送出中...';
      setTimeout(() => {
        $('input-text').value = '';
        sendQuery(text);
        micStatus.textContent = '';
      }, 200);
    } else {
      micStatus.textContent = '';
    }
  };

  micBtn.addEventListener('click', () => {
    if (isRecording) {
      recognition.stop();
    } else {
      $('input-text').value = '';
      micStatus.textContent = '';
      try {
        recognition.start();
      } catch (e) {
        micStatus.textContent = '語音啟動失敗：' + e.message;
      }
    }
  });
}
